name: "CORTEX — Daily Research Pulse"

on:
  schedule:
    - cron: '30 18 * * *'  # 00:00 IST (UTC+5:30)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  daily-pulse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "CORTEX[bot]"
          git config --global user.email "cortex-bot@users.noreply.github.com"

      - name: Run Daily Autocommit
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python autocommit.py

      - name: Push Changes
        run: git push origin main
