name: "CORTEX — Public Interface (Pages)"

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install MkDocs Material
        run: |
          pip install mkdocs-material mkdocs-roamlinks-plugin

      - name: Prepare Docs Directory
        run: |
          # Copy root markdown files into docs/
          cp *.md docs/ 2>/dev/null || true
          
          # README.md is the index
          cp README.md docs/index.md
          
          # Copy folders if they exist
          cp -r blogs docs/ 2>/dev/null || true
          cp -r papers docs/ 2>/dev/null || true
          cp -r snippets docs/ 2>/dev/null || true
          cp -r art docs/ 2>/dev/null || true
          
          # Clean up any duplicated READMEs
          rm -f docs/README.md

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
